name: Build Android APK
on: [push] # Se lance dès que tu enregistres un changement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Build with Buildozer
        uses: ArtemSerebryakov/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.8

      - name: Upload APK # Te donne le lien de téléchargement à la fin
        uses: actions/upload-artifact@v2
        with:
          name: package
          path: bin/*.apk
